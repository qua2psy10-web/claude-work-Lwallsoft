<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L型擁壁 設計計算</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/report.css">
</head>
<body>
<div id="app">
  <div id="panel">
    <header>
      <h1>L型擁壁 設計計算</h1>
      <div class="sub">道路土工 擁壁工指針 準拠 ／ 試行くさび法（仮想背面）・安定計算・部材照査・計算書出力</div>
    </header>
    <div class="toolbar">
      <select id="preset">
        <option value="">― プリセット選択 ―</option>
        <option value="standard">標準 H=3.0m レベル</option>
        <option value="slope">H=3.0m 嵩上げ盛土1:1.5</option>
        <option value="tall">H=5.0m 標準</option>
        <option value="pureL">逆L型（つま先版なし）</option>
        <option value="collision">H=3.0m 衝突荷重考慮</option>
        <option value="water">H=3.0m 水位・揚圧力考慮</option>
        <option value="haunch">H=3.0m 隅角部ハンチ付き</option>
      </select>
      <button id="btn-print" class="primary">印刷 / PDF保存</button>
      <button id="btn-save">入力を保存(JSON)</button>
      <button id="btn-load">読込</button>
      <input type="file" id="file-load" accept=".json" style="display:none">
    </div>

    <fieldset>
      <legend>標題</legend>
      <div class="row"><input type="text" class="wide" data-path="title"></div>
    </fieldset>

    <fieldset>
      <legend>形状寸法（L型擁壁）</legend>
      <div class="row"><label>擁壁全高 H</label><input type="number" step="0.05" data-path="geometry.H"><span class="unit">m</span></div>
      <div class="row"><label>たて壁 天端厚 t1</label><input type="number" step="0.05" data-path="geometry.t1"><span class="unit">m</span></div>
      <div class="row"><label>たて壁 付け根厚 t2</label><input type="number" step="0.05" data-path="geometry.t2"><span class="unit">m</span></div>
      <div class="row"><label>つま先版長 B1</label><input type="number" step="0.05" data-path="geometry.B1"><span class="unit">m</span></div>
      <div class="row"><label>かかと版長 B3</label><input type="number" step="0.05" data-path="geometry.B3"><span class="unit">m</span></div>
      <div class="row"><label>底版厚 t3</label><input type="number" step="0.05" data-path="geometry.t3"><span class="unit">m</span></div>
      <div class="row"><label>根入れ深さ Df</label><input type="number" step="0.05" data-path="geometry.Df"><span class="unit">m</span></div>
      <div class="row"><label>隅角部ハンチ 高さ（0=なし）</label><input type="number" step="0.05" data-path="geometry.haunch.height"><span class="unit">m</span></div>
      <div class="row"><label>隅角部ハンチ 幅</label><input type="number" step="0.05" data-path="geometry.haunch.width"><span class="unit">m</span></div>
    </fieldset>

    <fieldset>
      <legend>背面盛土（嵩上げ）</legend>
      <div class="row"><label>嵩上げ高さ（0=レベル、負値=天端からの落差）</label><input type="number" step="0.1" data-path="backfill.raise"><span class="unit">m</span></div>
      <div class="row"><label>法面勾配 1:n の n</label><input type="number" step="0.1" data-path="backfill.slopeN"><span class="unit">-</span></div>
    </fieldset>

    <fieldset>
      <legend>土質・基礎地盤</legend>
      <div class="row"><label>裏込め土 湿潤単位体積重量 γ</label><input type="number" step="0.5" data-path="soil.gamma"><span class="unit">kN/m³</span></div>
      <div class="row"><label>裏込め土 水中単位体積重量 γ'</label><input type="number" step="0.1" data-path="soil.gammaSub"><span class="unit">kN/m³</span></div>
      <div class="row"><label>水の単位体積重量 γw</label><input type="number" step="0.1" data-path="soil.gammaW"><span class="unit">kN/m³</span></div>
      <div class="row"><label>せん断抵抗角 φ</label><input type="number" step="1" data-path="soil.phi"><span class="unit">度</span></div>
      <div class="row"><label>粘着力 c（常時）</label><input type="number" step="1" data-path="soil.c"><span class="unit">kN/m²</span></div>
      <div class="row"><label>粘着力 cE（地震時）</label><input type="number" step="1" data-path="soil.cE"><span class="unit">kN/m²</span></div>
      <div class="row"><label>たて壁計算用 δ = 係数×φ</label><input type="number" step="0.001" data-path="soil.deltaStem"><span class="unit">×φ</span></div>
      <div class="row"><label>摩擦係数 μ</label><input type="number" step="0.05" data-path="stability.mu"><span class="unit">-</span></div>
      <div class="row"><label>付着力 cB</label><input type="number" step="1" data-path="stability.cB"><span class="unit">kN/m²</span></div>
    </fieldset>

    <fieldset>
      <legend>コンクリート・材料</legend>
      <div class="row"><label>鉄筋ｺﾝｸﾘｰﾄ単位体積重量 γc</label><input type="number" step="0.5" data-path="concrete.gammaC"><span class="unit">kN/m³</span></div>
      <div class="row"><label>設計基準強度 σck</label><input type="number" step="3" data-path="material.sigmaCk"><span class="unit">N/mm²</span></div>
      <div class="row"><label>許容曲げ圧縮応力度 σca</label><input type="number" step="0.5" data-path="material.sigmaCa"><span class="unit">N/mm²</span></div>
      <div class="row"><label>許容せん断応力度 τa1</label><input type="number" step="0.01" data-path="material.tauA"><span class="unit">N/mm²</span></div>
      <div class="row"><label>鉄筋許容引張応力度 σsa</label><input type="number" step="10" data-path="material.sigmaSa"><span class="unit">N/mm²</span></div>
    </fieldset>

    <fieldset>
      <legend>荷重</legend>
      <div class="row"><label>活荷重を考慮する</label><input type="checkbox" data-path="surcharge.enabled"><span class="unit"></span></div>
      <div class="grp" id="grp-surcharge">
        <div class="row"><label>載荷重 q</label><input type="number" step="1" data-path="surcharge.q"><span class="unit">kN/m²</span></div>
      </div>
      <div class="row"><label>地震時照査を行う</label><input type="checkbox" data-path="seismic.enabled"><span class="unit"></span></div>
      <div class="grp" id="grp-seismic">
        <div class="row"><label>設計水平震度 kh</label><input type="number" step="0.01" data-path="seismic.kh"><span class="unit">-</span></div>
      </div>
      <div class="row"><label>衝突荷重を考慮する</label><input type="checkbox" data-path="collision.enabled"><span class="unit"></span></div>
      <div class="grp" id="grp-collision">
        <div class="row"><label>衝突荷重 P</label><input type="number" step="0.5" data-path="collision.P"><span class="unit">kN/m</span></div>
        <div class="row"><label>作用高さ h（底版下面から）</label><input type="number" step="0.05" data-path="collision.h"><span class="unit">m</span></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>水位</legend>
      <div class="row"><label>水位を考慮する</label><input type="checkbox" data-path="water.enabled"><span class="unit"></span></div>
      <div class="grp" id="grp-water">
        <div class="row"><label>揚圧力を考慮する</label><input type="checkbox" data-path="water.considerUplift"><span class="unit"></span></div>
        <div class="row"><label>前面水位（底版下面から）</label><input type="number" step="0.1" data-path="water.front"><span class="unit">m</span></div>
        <div class="row"><label>背面水位（底版下面から）</label><input type="number" step="0.1" data-path="water.back"><span class="unit">m</span></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>安定計算条件</legend>
      <div class="row"><label>許容偏心量 B/n の n（常時）</label><input type="number" step="0.5" data-path="stability.normal.n"><span class="unit">-</span></div>
      <div class="row"><label>滑動安全率 Fs（常時）</label><input type="number" step="0.05" data-path="stability.normal.Fs"><span class="unit">-</span></div>
      <div class="row"><label>許容支持力度 qa（常時）</label><input type="number" step="10" data-path="stability.normal.qa"><span class="unit">kN/m²</span></div>
      <div class="row"><label>許容偏心量 B/n の n（地震時）</label><input type="number" step="0.5" data-path="stability.seismic.n"><span class="unit">-</span></div>
      <div class="row"><label>滑動安全率 Fs（地震時）</label><input type="number" step="0.05" data-path="stability.seismic.Fs"><span class="unit">-</span></div>
      <div class="row"><label>許容支持力度 qa（地震時）</label><input type="number" step="10" data-path="stability.seismic.qa"><span class="unit">kN/m²</span></div>
      <div class="grp" id="grp-collision-cond">
        <div class="row"><label>許容偏心量 B/n の n（衝突時）</label><input type="number" step="0.5" data-path="stability.collision.n"><span class="unit">-</span></div>
        <div class="row"><label>滑動安全率 Fs（衝突時）</label><input type="number" step="0.05" data-path="stability.collision.Fs"><span class="unit">-</span></div>
        <div class="row"><label>許容支持力度 qa（衝突時）</label><input type="number" step="10" data-path="stability.collision.qa"><span class="unit">kN/m²</span></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>部材計算</legend>
      <div class="row"><label>部材照査（第5章）を出力する</label><input type="checkbox" data-path="member.calc"><span class="unit"></span></div>
      <div class="grp" id="grp-member">
        <div class="row"><label>割増係数（常時）</label><input type="number" step="0.05" data-path="material.kNormal"><span class="unit">-</span></div>
        <div class="row"><label>割増係数（地震時）</label><input type="number" step="0.05" data-path="material.kSeismic"><span class="unit">-</span></div>
        <div class="row"><label>最小鉄筋比 pmin</label><input type="number" step="0.0005" data-path="material.pMin"><span class="unit">-</span></div>
        <div class="row"><label>たて壁 鉄筋径</label>
          <select data-path="member.stem.bar"><option>D13</option><option>D16</option><option>D19</option><option>D22</option><option>D25</option><option>D29</option><option>D32</option></select><span class="unit"></span></div>
        <div class="row"><label>たて壁 ピッチ</label><input type="number" step="25" data-path="member.stem.pitch"><span class="unit">mm</span></div>
        <div class="row"><label>たて壁 かぶり</label><input type="number" step="5" data-path="member.stem.cover"><span class="unit">mm</span></div>
        <div class="row"><label>つま先版 鉄筋径</label>
          <select data-path="member.toe.bar"><option>D13</option><option>D16</option><option>D19</option><option>D22</option><option>D25</option><option>D29</option><option>D32</option></select><span class="unit"></span></div>
        <div class="row"><label>つま先版 ピッチ</label><input type="number" step="25" data-path="member.toe.pitch"><span class="unit">mm</span></div>
        <div class="row"><label>つま先版 かぶり</label><input type="number" step="5" data-path="member.toe.cover"><span class="unit">mm</span></div>
        <div class="row"><label>かかと版 鉄筋径</label>
          <select data-path="member.heel.bar"><option>D13</option><option>D16</option><option>D19</option><option>D22</option><option>D25</option><option>D29</option><option>D32</option></select><span class="unit"></span></div>
        <div class="row"><label>かかと版 ピッチ</label><input type="number" step="25" data-path="member.heel.pitch"><span class="unit">mm</span></div>
        <div class="row"><label>かかと版 かぶり</label><input type="number" step="5" data-path="member.heel.cover"><span class="unit">mm</span></div>
      </div>
    </fieldset>
  </div>

  <div id="preview">
    <div class="status" id="status"></div>
    <div id="report-area"></div>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
